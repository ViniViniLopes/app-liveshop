<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Carrinho de Compras</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Montserrat', sans-serif; }
        
        /* Subtle glowing background effect to mimic neon-noir atmosphere without a video */
        .ambient-glow {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(160,251,0,0.05) 0%, rgba(16,21,8,0) 70%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen relative flex flex-col antialiased">
<div class="ambient-glow"></div>
<!-- Header (Focused View - No Shared Nav) -->
<header class="sticky top-0 z-50 flex items-center justify-between px-margin-mobile py-4 bg-background/80 backdrop-blur-xl border-b border-outline-variant/30">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high/50 text-on-surface hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-headline-md text-on-surface flex-1 text-center pr-10">Carrinho</h1>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col max-w-md mx-auto w-full px-margin-mobile pt-6 pb-[120px] gap-6">
<!-- Cart Items List -->
<div class="flex flex-col gap-4">
<!-- Item 1 -->
<div class="flex gap-4 p-3 rounded-lg bg-surface-container/60 backdrop-blur-2xl border border-outline-variant/20 shadow-[0_4px_24px_rgba(0,0,0,0.2)]">
<div class="w-24 h-24 shrink-0 rounded-DEFAULT overflow-hidden relative">
<img alt="Product" class="w-full h-full object-cover" data-alt="A highly detailed close-up shot of a vibrant red, hyper-modern athletic sneaker floating in a dark, atmospheric void. The shoe is illuminated by sharp, electric lime edge lighting that highlights its sleek silhouette and textured mesh upper. The overall mood is energetic, premium, and futuristic, aligning with a high-velocity, neon-noir digital aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJ4VEoShyVYCGCtCtQLk_uStgLc0mrqruCurxpgi8E0rJSLfWTmoOsJhXRbAUEam4qzBq0QQaYkKn538z-186ggQCOxV82TK7cHTDn24dTC5_UQyFtEy2q-LgISOILB0LuPU-vRoT6q8pDUul3W-m3avUI0pRlFJgKzIxZhZTUVjZbEmpl5R94JuR-90Y0zAOXOvjesLJqCQu1_uO4XtgvmfvxQeOdk3cDL7j2QNrcP3vX8ca_s3WsvxzDl27hk8foVVx1jvZXzsM"/>
</div>
<div class="flex flex-col flex-1 justify-between py-1">
<div class="flex justify-between items-start gap-2">
<div>
<h3 class="text-label-bold text-on-surface line-clamp-2 leading-tight mb-1">Tênis HyperDrive Pro X</h3>
<p class="text-label-sm text-on-surface-variant">Tamanho: 42 • Vermelho</p>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors p-1">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</button>
</div>
<div class="flex items-center justify-between mt-2">
<span class="text-label-bold text-primary-fixed">R$ 899,00</span>
<div class="flex items-center gap-3 bg-surface-container-highest/80 rounded-full px-2 py-1 border border-outline-variant/30">
<button class="w-6 h-6 flex items-center justify-center text-on-surface rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="remove">remove</span>
</button>
<span class="text-label-bold text-on-surface w-4 text-center">1</span>
<button class="w-6 h-6 flex items-center justify-center text-on-surface rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="flex gap-4 p-3 rounded-lg bg-surface-container/60 backdrop-blur-2xl border border-outline-variant/20 shadow-[0_4px_24px_rgba(0,0,0,0.2)]">
<div class="w-24 h-24 shrink-0 rounded-DEFAULT overflow-hidden relative">
<img alt="Product" class="w-full h-full object-cover" data-alt="A crisp, high-contrast image of a sleek, minimalist black graphic t-shirt featuring a subtle, electric lime geometric logo. The t-shirt is displayed against a deep, light-absorbing dark background to make the accent color pop. The lighting is dramatic and directional, creating a moody, hyper-modern vibe that feels both premium and street-ready." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDZK5kF9aoK61Osq-hJ8If5cQUQ3x5eQquXfnX0F54YeTI-pUtKGhInCnm3BwQ0nfzPV80WeUilTYHlTga-39ZWDoZM8j23wCc3D9jDYLpGeV9kty5huAWScOVWg5Mt-rVCDXMz_F1d317-Tf2sRjQ8gelZXUDOPfth1c4jZjUAQTq2ySMYjnsEOmkusbIw1skl3GjvvQ2_MtzQbloSUiD60eojPzOnmLj1lrswz5VWR4CYiYaMHcmSTkpa1j6mzrPpU1_lVY1gRE"/>
</div>
<div class="flex flex-col flex-1 justify-between py-1">
<div class="flex justify-between items-start gap-2">
<div>
<h3 class="text-label-bold text-on-surface line-clamp-2 leading-tight mb-1">Camiseta Core V2</h3>
<p class="text-label-sm text-on-surface-variant">Tamanho: G • Preto</p>
</div>
<button class="text-on-surface-variant hover:text-error transition-colors p-1">
<span class="material-symbols-outlined text-[20px]" data-icon="delete">delete</span>
</button>
</div>
<div class="flex items-center justify-between mt-2">
<span class="text-label-bold text-primary-fixed">R$ 149,90</span>
<div class="flex items-center gap-3 bg-surface-container-highest/80 rounded-full px-2 py-1 border border-outline-variant/30">
<button class="w-6 h-6 flex items-center justify-center text-on-surface rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="remove">remove</span>
</button>
<span class="text-label-bold text-on-surface w-4 text-center">2</span>
<button class="w-6 h-6 flex items-center justify-center text-on-surface rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Summary Section -->
<div class="mt-4 p-5 rounded-xl bg-surface-container-low/80 backdrop-blur-md border border-outline-variant/20 flex flex-col gap-3">
<h2 class="text-label-bold text-on-surface mb-2">Resumo da Compra</h2>
<div class="flex justify-between items-center text-body-sm text-on-surface-variant">
<span>Subtotal (3 itens)</span>
<span class="text-on-surface">R$ 1.198,80</span>
</div>
<div class="flex justify-between items-center text-body-sm text-on-surface-variant">
<span>Frete Expresso</span>
<span class="text-primary-fixed-dim">Grátis</span>
</div>
<div class="h-[1px] w-full bg-outline-variant/30 my-2"></div>
<div class="flex justify-between items-end">
<span class="text-body-md text-on-surface">Total</span>
<div class="flex flex-col items-end">
<span class="text-headline-md text-primary-fixed">R$ 1.198,80</span>
<span class="text-[10px] text-on-surface-variant mt-1">Em até 10x de R$ 119,88 sem juros</span>
</div>
</div>
</div>
</main>
<!-- Sticky Checkout Button area -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container/90 backdrop-blur-xl border-t border-outline-variant/30 p-margin-mobile pb-safe-area-bottom z-50">
<div class="max-w-md mx-auto">
<button class="w-full flex items-center justify-center gap-2 bg-primary-fixed text-on-primary font-label-bold text-[16px] py-4 rounded-full shadow-[0_0_20px_rgba(160,251,0,0.25)] hover:bg-primary-fixed-dim hover:scale-[0.98] transition-all duration-200">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
                Finalizar Compra
            </button>
</div>
</div>
</body></html>
