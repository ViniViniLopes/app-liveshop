<!DOCTYPE html>

<html class="dark" lang="pt"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TikTok Shop - Video Feed</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->

        darkMode: "class",

                    "error": "#ffb4ab",

                    "primary-container": "#a0fb00",
                    "background": "#101508",
                    "on-primary": "#1f3700",

                    "on-error-container": "#ffdad6",
                    "surface-container-high": "#262c1e",
                    "on-surface": "#dfe5cf",
                    "secondary": "#c8c6c5",
                    "surface-dim": "#101508",
                    "outline": "#8a947a",
                    "on-error": "#690005",
                    "surface-container": "#1c2114",
                    "tertiary-fixed": "#e2e2e2",
                    "on-primary-fixed-variant": "#304f00",
                    "surface-variant": "#313728",
                    "secondary-container": "#4a4949",
                    "on-background": "#dfe5cf",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-primary-fixed": "#102000"
            },
            borderRadius: {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            spacing: {
                    "margin-desktop": "32px",
                    "safe-area-bottom": "32px",
                    "margin-mobile": "16px",
                    "gutter": "12px",
                    "unit": "4px"
            },
            fontFamily: {
                    "headline-lg": ["Montserrat"],
                    "display-lg": ["Montserrat"],
                    "label-bold": ["Inter"],
                    "label-sm": ["Inter"],

                    "body-md": ["Inter"]
            }
          }
        }
      }
    </script>
<style>
        .glass-panel {
            background-color: rgba(24, 29, 16, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .text-shadow-sm {
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        .glow-effect {
            box-shadow: 0 0 20px rgba(160, 251, 0, 0.25);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md h-screen w-screen overflow-hidden relative selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Video Background Container -->
<div class="absolute inset-0 z-0">
<!-- Main Video Placeholder Image -->
<div class="w-full h-full bg-cover bg-center" data-alt="A dynamic, vertical full-screen video still showing a trendy young model showcasing glowing, neon-accented streetwear. The lighting is moody and cinematic, featuring a 'neon-noir' aesthetic with deep blacks and vibrant, high-contrast electric lime green edge lighting. The scene feels energetic, hyper-modern, and premium, perfectly suited for a fast-paced, immersive social commerce platform." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC1CHkbjj6BJIHC4OWIvcB71nXW9RL_MeRA9u7ARWcRwe0McvZ9pmO-Tp5rZO3EI9Vnfx56uRluFfgughbnss6xYwqEPyDcTz2K0ExF5rpmZFEhOXsO4Ttt8erdVc7reJbPpnrjxPeWrXiK57peu4TpRnS9WiBf75xuqYGcm-sDdhYOnlzIvxw7Lxl9xTSFTQ5dLv1xMo5XpEGOQYDtRQ0N7moYg5BDQOaRCQif8f4Jd57RvJmftMUS91EexoA0W6WJMHhc1tNlmVE');">
</div>
<!-- Gradient Overlay for readability -->
<div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/80"></div>
</div>
<!-- Top Safe Area / Header -->
<header class="absolute top-0 left-0 w-full p-margin-mobile flex justify-between items-start z-10 pt-safe-area-bottom">
<!-- Shop Profile Chip -->
<button class="glass-panel rounded-full flex items-center gap-2 pr-4 pl-1 py-1 hover:bg-surface-container-high/60 transition-colors">
<img alt="Creator Avatar" class="w-8 h-8 rounded-full border border-tertiary/20 object-cover" data-alt="A small, circular avatar portrait of a stylish young creator with a confident expression, set against a dark, moody background with subtle green neon highlights, fitting a hyper-modern digital identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDwR_TV5gx4V8iFaB0OP5e4NR9w9a95f-Yn9ya0TwbYxSIcO-TbvWnDOfkauGRUHnxWCA2tYAVeUsATrRchYzwWx28gL7bFaMaaM44alYT2-blfkg6K2RSljoCuUlKl74DyLI1eszsUcG8zfuKViogLxPKEEfcxmKJTGzHRhbhguZGdZ2fstRMUnCw2esLpSjZLjQX7gWRX6OhnAY_TOxQ1rlu1ZZXt_Zj0QrAzN6LZA7Mvxb4uoh2d2csmLeAVliZKo_ttrlawQcc"/>
<div class="flex flex-col items-start">
<span class="font-label-bold text-[13px] leading-tight text-tertiary">Neon Wear</span>
<span class="font-label-sm text-[10px] text-on-surface-variant">@neonwear_br</span>
</div>
<span class="material-symbols-outlined text-primary-fixed ml-1 text-[18px]" data-icon="add_circle">add_circle</span>
</button>
<!-- Search Icon -->
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/20 backdrop-blur-md border border-white/10 text-tertiary">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</header>
<!-- Right Side Actions (FABs) -->
<div class="absolute right-margin-mobile bottom-[20%] flex flex-col items-center gap-6 z-20">
<!-- Like -->
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-tertiary group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[28px]" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<span class="font-label-bold text-xs text-tertiary text-shadow-sm">124K</span>
</button>
<!-- Comment -->
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-tertiary group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[28px]" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
</div>
<span class="font-label-bold text-xs text-tertiary text-shadow-sm">1.2K</span>
</button>
<!-- Share -->
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-tertiary group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[28px]" data-icon="share">share</span>
</div>
<span class="font-label-bold text-xs text-tertiary text-shadow-sm">856</span>
</button>
</div>
<!-- Bottom Area: Product Overlay & Controls -->
<div class="absolute bottom-0 left-0 w-full p-margin-mobile pb-safe-area-bottom z-30 flex flex-col gap-4">
<!-- Video Description -->
<div class="w-[80%] pr-4 mb-2">
<h2 class="font-headline-md text-[18px] text-tertiary font-bold mb-1 text-shadow-sm">Jaqueta Corta-Vento Luminosa</h2>
<p class="font-body-md text-sm text-on-surface-variant line-clamp-2 text-shadow-sm">A peça perfeita para a noite. Brilha sob luz negra e tem caimento perfeito. #streetwear #neon</p>
</div>
<!-- E-Commerce Product Card (Glassmorphism) -->
<div class="glass-panel rounded-[24px] p-3 flex flex-col gap-3">
<div class="flex items-center gap-3">
<img alt="Product Thumbnail" class="w-16 h-16 rounded-xl object-cover border border-white/10" data-alt="A close-up product shot of a sleek, modern windbreaker jacket featuring vibrant electric lime accents. The background is a deeply blurred dark studio setting, emphasizing the glowing neon colors and premium fabric texture of the jacket in a highly stylized, commercial presentation." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBU4k5xu1UpdVF_XET_hxTKdadMucNtpiwjyhjEZUi9ykYbl0m6dfbpxVEKfiPWHiPAWA1Ej2DJKxYDXqc6nc4vZK0Kxl9SlyLMkgGx9FZrvVsqglKaKf53y6WsDKuD5q90_Ntsp4AapNcrxQAp6ZOuVf1hldXY9XEe295nQ2nzzaNZm3m3G8f300mLVDQy3QdA1Cykv0wclh9k_Kyvopjlof1H7p83hxtIcEZI4JPL_3mXlGbEkz5IAIy4bJI0veqHQA-nLIH1K2Y"/>
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<span class="bg-error/20 text-error px-2 py-0.5 rounded text-[10px] font-label-bold border border-error/30">Em Alta</span>
<span class="text-tertiary font-label-bold text-sm">R$ 199,90</span>
</div>
<p class="text-on-surface-variant font-body-md text-xs line-clamp-1">Jaqueta Corta-Vento Reflexiva - Edição Limitada</p>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-2">
<button class="flex-1 bg-primary-fixed hover:bg-primary-fixed-dim text-on-primary-fixed font-label-bold text-sm py-3 rounded-full flex items-center justify-center gap-2 transition-colors glow-effect">
<span class="material-symbols-outlined text-[20px]" data-icon="shopping_cart">shopping_cart</span>
                    Comprar Agora
                </button>
<button class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-tertiary hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="bookmark">bookmark</span>
</button>
</div>
</div>
</div>
</body></html>
