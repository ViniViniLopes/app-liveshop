<body class="bg-background text-on-background min-h-screen relative overflow-hidden flex flex-col justify-end md:justify-center items-center">
<!-- Immersive Video Background Simulator -->
<div class="absolute inset-0 z-0">
<img alt="Background" class="w-full h-full object-cover blur-md opacity-60 scale-110 pointer-events-none" data-alt="A blurred, dynamic video still of an urban runner moving quickly through a city street at dusk. The lighting is moody with neon reflections. The colors are muted urban tones with a fast-paced, energetic hyper-modern aesthetic. Dark mode, cinematic lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBbJH69yj_f6EeOvtIMf1DVxXzlF14bw1kAVM1arKG6EY09pXmrcnI9Hpf4Xo0saO6WU140rBw9VZPQh1YCkfRvgPmsftgLIq4CraBWPo_CZoSmTttrUmdlxvTLXeII9A1VTue1uiW3P_bOiXCbMYQWFgSoMGLc_L_dOtjO2ocvjAFH6yf3DbU91HWT66HmBjqTSEMCY_GiS4x1QQPqJX6mLiET-vcraUY25ilR6t4QjQYEruU5-BebiRZPXP0Y7JuGryoF0LOy6Pk"/>
<div class="absolute inset-0 bg-surface-container-lowest/40 mix-blend-multiply pointer-events-none"></div>
</div>
<!-- Login Container - Glassmorphism -->
<main class="relative z-10 w-full max-w-md mx-auto p-margin-mobile pt-16 md:pt-margin-mobile pb-safe-area-bottom flex flex-col gap-8 h-[751px] md:h-auto bg-surface/60 backdrop-blur-3xl rounded-t-[3rem] md:rounded-[3rem] border border-white/10 shadow-[0_-8px_32px_rgba(0,0,0,0.5)] md:shadow-2xl">
<!-- Header / Brand -->
<header class="flex flex-col items-center justify-center pt-8 md:pt-0 gap-2">
<h1 class="font-display-lg text-display-lg text-primary-fixed italic tracking-tighter text-center leading-none">
                RUNNERS'<br/>
<span class="text-tertiary not-italic">XCHANGE</span>
</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-2">Enter the feed.</p>
</header>
<!-- Form Area -->
<form class="flex flex-col gap-6 w-full mt-4">
<!-- Email Input -->
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-fixed transition-colors pointer-events-none" style="font-variation-settings: 'FILL' 1;">
                    person
                </span>
<input class="w-full h-14 pl-12 pr-4 bg-white/5 border border-white/10 rounded-full font-body-md text-body-md text-tertiary placeholder:text-on-surface-variant/60 focus:bg-white/10 focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed focus:outline-none transition-all shadow-inner" placeholder="Enter Email" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary-fixed transition-colors pointer-events-none" style="font-variation-settings: 'FILL' 1;">
                    key
                </span>
<input class="w-full h-14 pl-12 pr-12 bg-white/5 border border-white/10 rounded-full font-body-md text-body-md text-tertiary placeholder:text-on-surface-variant/60 focus:bg-white/10 focus:border-primary-fixed focus:ring-1 focus:ring-primary-fixed focus:outline-none transition-all shadow-inner" placeholder="Enter Password" required="" type="password"/>
<!-- Forgot Password Link inside input field for tight layout -->
<a class="absolute right-4 top-1/2 -translate-y-1/2 font-label-sm text-label-sm text-on-surface-variant hover:text-primary-fixed transition-colors" href="#">
                    Forgot?
                </a>
</div>
<!-- Submit Action -->
<button class="w-full h-14 mt-4 bg-primary-fixed text-surface-container-lowest font-label-bold text-label-bold rounded-full shadow-[0_0_20px_#a0fb0044] hover:bg-primary-fixed-dim hover:scale-[0.98] active:scale-95 transition-all flex justify-center items-center gap-2" type="submit">
                Submit
                <span class="material-symbols-outlined text-surface-container-lowest">arrow_forward</span>
</button>
</form>
<!-- Social / Alternative Login -->
<div class="mt-auto md:mt-8 flex flex-col items-center gap-6">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Or Sign Up With</p>
<div class="flex justify-center gap-4">
<!-- Social Buttons - Glass pills -->
<button class="w-14 h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-tertiary hover:bg-white/10 hover:border-primary-fixed/50 hover:text-primary-fixed transition-all active:scale-95" type="button">
<svg class="w-6 h-6 fill-current" viewbox="0 0 24 24"><path d="M12 2.04C6.5 2.04 2 6.53 2 12.06C2 17.06 5.66 21.21 10.44 21.96V14.96H7.9V12.06H10.44V9.85C10.44 7.34 11.93 5.96 14.22 5.96C15.31 5.96 16.45 6.15 16.45 6.15V8.62H15.19C13.95 8.62 13.56 9.39 13.56 10.18V12.06H16.34L15.89 14.96H13.56V21.96A10 10 0 0 0 22 12.06C22 6.53 17.5 2.04 12 2.04Z"></path></svg>
</button>
<button class="w-14 h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-tertiary hover:bg-white/10 hover:border-primary-fixed/50 hover:text-primary-fixed transition-all active:scale-95" type="button">
<svg class="w-6 h-6 fill-current" viewbox="0 0 24 24"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"></path></svg>
</button>
<button class="w-14 h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-tertiary hover:bg-white/10 hover:border-primary-fixed/50 hover:text-primary-fixed transition-all active:scale-95" type="button">
<span class="material-symbols-outlined">mail</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-4 pb-4">
                Don't have an account? <a class="text-primary-fixed hover:underline font-label-bold text-label-bold" href="#">Sign Up</a>
</p>
</div>
