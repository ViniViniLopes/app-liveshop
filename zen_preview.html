<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liveshop Zen - Preview Interativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .neon-text { color: #A3FF00; text-shadow: 0 0 10px rgba(163, 255, 0, 0.3); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .heart-active { color: #A3FF00; fill: #A3FF00; }
        .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-32">

    <!-- TOP BAR -->
    <header class="sticky top-0 z-50 bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-white/5 px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <button class="w-6 h-6 flex flex-col justify-between py-1.5 btn-press">
                <div class="h-0.5 w-full bg-white/60"></div>
                <div class="h-0.5 w-full bg-white/60"></div>
                <div class="h-0.5 w-full bg-white/60"></div>
            </button>
            <h1 class="text-xl font-black italic uppercase tracking-tighter neon-text">Liveshop Zen</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="alert('Notificações Push registradas!')" class="w-10 h-10 rounded-full glass flex items-center justify-center text-white/60 btn-press">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                <div class="absolute top-2 right-2 w-2 h-2 bg-[#A3FF00] rounded-full border border-[#0a0a0a]"></div>
            </button>
        </div>
    </header>

    <main class="p-6 space-y-8">
        
        <!-- SEARCH -->
        <div class="relative">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-white/30">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" placeholder="Buscar drops..." class="w-full bg-white/5 border border-white/10 rounded-full py-4 pl-12 pr-6 text-sm focus:outline-none border-white/20">
        </div>

        <!-- HERO -->
        <div onclick="window.location.href='/live'" class="relative aspect-[16/9] rounded-[32px] overflow-hidden border border-white/10 cursor-pointer group btn-press">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent p-6 flex flex-col justify-end">
                <span class="bg-[#A3FF00] text-black text-[10px] font-black uppercase px-2 py-1 rounded-md self-start mb-2">LIVE AGORA</span>
                <h2 class="text-3xl font-black italic uppercase leading-none">Drop: Cyber-Zen V1</h2>
                <p class="text-white/60 text-sm font-bold">Com Maya @liveshopzen</p>
            </div>
        </div>

        <!-- PRODUCTS -->
        <section>
            <h2 class="text-lg font-black italic uppercase tracking-tight mb-4">Novos Drops</h2>
            <div class="grid grid-cols-2 gap-4">
                <!-- PRODUCT 1 -->
                <div class="space-y-2">
                    <div class="aspect-square glass rounded-[32px] overflow-hidden relative group">
                        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" class="w-full h-full object-cover">
                        <button onclick="toggleHeart(this)" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-black/40 backdrop-blur-md border border-white/10 flex items-center justify-center text-white transition-all btn-press">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        </button>
                    </div>
                    <p class="text-xs font-bold truncate px-2">Zen Runner Pro</p>
                    <p class="text-sm font-black neon-text px-2">R$ 899,00</p>
                </div>
                <!-- PRODUCT 2 -->
                <div class="space-y-2">
                    <div class="aspect-square glass rounded-[32px] overflow-hidden relative group">
                        <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f" class="w-full h-full object-cover">
                        <button onclick="toggleHeart(this)" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-black/40 backdrop-blur-md border border-white/10 flex items-center justify-center text-white transition-all btn-press">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        </button>
                    </div>
                    <p class="text-xs font-bold truncate px-2">Neon Fitness Set</p>
                    <p class="text-sm font-black neon-text px-2">R$ 349,00</p>
                </div>
            </div>
        </section>

    </main>

    <!-- FAB -->
    <button onclick="alert('Indo para o Carrinho...')" class="fixed bottom-24 right-6 w-16 h-16 rounded-full bg-[#A3FF00] shadow-2xl shadow-[#A3FF00]/40 flex items-center justify-center text-black btn-press">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
    </button>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 w-full h-20 bg-[#0a0a0a]/80 backdrop-blur-3xl border-t border-white/5 flex justify-around items-center px-6 pb-4">
        <div class="flex flex-col items-center gap-1 neon-text cursor-pointer btn-press">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
            <span class="text-[8px] font-black uppercase tracking-widest">Home</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-white/40 cursor-pointer btn-press">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <span class="text-[8px] font-black uppercase tracking-widest">Busca</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-white/40 cursor-pointer btn-press">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[8px] font-black uppercase tracking-widest">Perfil</span>
        </div>
    </nav>

    <script>
        function toggleHeart(btn) {
            const svg = btn.querySelector('svg');
            if (svg.getAttribute('fill') === 'currentColor') {
                svg.setAttribute('fill', 'none');
                svg.classList.remove('heart-active');
                btn.style.color = 'white';
            } else {
                svg.setAttribute('fill', 'currentColor');
                svg.classList.add('heart-active');
                btn.style.color = '#A3FF00';
            }
        }
    </script>
</body>
</html>
